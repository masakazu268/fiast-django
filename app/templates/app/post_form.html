{% extends 'app/base.html' %}
{% load widget_tweaks %}

{% block content %}

<div class="my-4">
    <h2>投稿</h2>
</div>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3 formpost">
        <label class="form-label">タイトル</label>
        {% render_field form.title class="form-control" placeholder="タイトルを入力" %}
    </div>

    <div class="mb-3 formpost">
        <label class="form-label">画像</label>
        {{ form.image }}
    </div>

    <div class="mb-3 formpost">
        <label class="form-label">本文</label>
        {% render_field form.content class="form-control" placeholder="本文を入力" %}
    </div>

    <button class="btn btn-warning mt-3" type="submit">投稿する</button>
</form>

{% endblock %}
